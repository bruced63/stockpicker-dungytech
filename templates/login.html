<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — StockPicker · Dungy Tech Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body { background:#0d1117; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        input { background:#0d1117!important; color:#e6edf3!important; border-color:#30363d!important; }
        input:focus { border-color:#1a6ed8!important; box-shadow:0 0 0 .2rem rgba(26,110,216,.25)!important; }
        .btn-dts { background:#1a6ed8; border-color:#1a6ed8; font-weight:600; }
        .btn-dts:hover { background:#1558b0; border-color:#1558b0; }
        .copyright { font-size:11px; color:#8b949e; text-align:center; margin-top:24px; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo-row">
        <span class="dts-badge">DTS</span>
        <div>
            <div class="auth-brand">Dungy Tech Solutions, <span>LLC</span></div>
            <div style="font-size:12px;color:#8b949e">StockPicker &mdash; Paper Trading &amp; Analysis</div>
        </div>
    </div>

    <h5 class="mb-1" style="color:#e6edf3">Sign in</h5>
    <p class="mb-4" style="font-size:13px;color:#8b949e">Enter your credentials to continue.</p>

    {% if error %}
    <div class="alert alert-danger py-2 px-3" style="font-size:13px">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label" style="font-size:13px;color:#8b949e">Username</label>
            <input type="text" name="username" class="form-control" required autofocus autocomplete="username">
        </div>
        <div class="mb-4">
            <label class="form-label" style="font-size:13px;color:#8b949e">Password</label>
            <input type="password" name="password" class="form-control" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-dts w-100">Sign In</button>
    </form>
    <div class="copyright">&copy; {{ current_year }} Dungy Tech Solutions, LLC</div>
</div>
<script>
const yr = new Date().getFullYear();
document.querySelector('.copyright').textContent = `© ${yr} Dungy Tech Solutions, LLC`;
</script>
</body>
</html>
