{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header"><i class="bi bi-person-circle"></i> My Profile</div>
            <div class="card-body">
                {% if notice %}
                <div class="alert alert-{{ notice[0] }} py-2" style="font-size:13px">{{ notice[1] }}</div>
                {% endif %}
                <p class="text-muted mb-3" style="font-size:13px">Signed in as <strong>{{ session_user }}</strong></p>
                <h6 class="mb-3">Change Password</h6>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current" class="form-control" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="password" class="form-control" required autocomplete="new-password">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm" class="form-control" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
                <a href="/" class="d-block text-center mt-3 text-muted" style="font-size:13px">← Back to dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
